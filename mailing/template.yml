AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: News Mailing API Lambda - Production V11 (cache table optimization)

Resources:
  ContentMailingV11ExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ContentMailing_News_Mailing_Prod_V11_Execution_Role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CloudWatchLogsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                Resource: arn:aws:logs:us-west-2:022542942195:*
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - arn:aws:logs:us-west-2:022542942195:log-group:/aws/lambda/*:*
        
        - PolicyName: VPCAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: AWSLambdaVPCAccessExecutionPermissions
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - ec2:CreateNetworkInterface
                  - ec2:DescribeNetworkInterfaces
                  - ec2:DescribeSubnets
                  - ec2:DeleteNetworkInterface
                  - ec2:AssignPrivateIpAddresses
                  - ec2:UnassignPrivateIpAddresses
                Resource: '*'
        
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:BatchGetItem
                  - dynamodb:BatchWriteItem
                  - dynamodb:ConditionCheckItem
                  - dynamodb:PutItem
                  - dynamodb:DescribeTable
                  - dynamodb:DeleteItem
                  - dynamodb:GetItem
                  - dynamodb:Scan
                  - dynamodb:Query
                  - dynamodb:UpdateItem
                  - dynamodb:GetShardIterator
                  - dynamodb:DescribeStream
                  - dynamodb:GetRecords
                  - dynamodb:ListStreams
                  - dynamodb:UpdateTimeToLive
                  - dynamodb:DescribeTimeToLive
                Resource:
                  - arn:aws:dynamodb:us-west-2:022542942195:table/engagement_request_log*
                  - arn:aws:dynamodb:us-west-2:022542942195:table/engagement_user_activity*
              - Effect: Allow
                Action:
                  - dynamodb:ListTables
                  - dynamodb:CreateTable
                Resource: "*"

  ContentMailingFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: News_Mailing_Prod_V11
      CodeUri: ./src
      Description: 'News mailing Lambda V11 — cache table optimization, ISP routing via category_id'
      MemorySize: 128
      Timeout: 20
      Handler: index.handler
      Runtime: nodejs22.x
      Architectures:
        - x86_64
      EphemeralStorage:
        Size: 512
      Environment:
        Variables:
          db_host: !Ref DBHost
          db_name: !Ref DBName
          db_password: !Ref DBPassword
          db_user: !Ref DBUser
      EventInvokeConfig:
        MaximumEventAgeInSeconds: 21600
        MaximumRetryAttempts: 2
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: BUFFERED
        Cors:
          AllowOrigins:
            - '*'
          MaxAge: 0
      PackageType: Zip
      Role: !GetAtt ContentMailingV11ExecutionRole.Arn
      RecursiveLoop: Terminate
      SnapStart:
        ApplyOn: None
      Tags:
        Product: ContentMailingNews
        Environment: Production
        Version: V11
      VpcConfig:
        SecurityGroupIds:
          - sg-0be4c169669971207
        SubnetIds:
          - subnet-04df9bfa3cdb1f767
          - subnet-0c180c5c475dbf2f8
        Ipv6AllowedForDualStack: false
      RuntimeManagementConfig:
        UpdateRuntimeOn: Auto


Parameters:

  StackName:
    Type: String
    Default: news-mailing-prod-v11
    Description: Name for the CloudFormation stack

  DeploymentRegion:
    Type: String
    Default: us-west-2
    Description: AWS Region for deployment
    
  DBHost:
    Type: String
    Description: RDS endpoint
    Default: sd-rds-01.c8lpklkvlcek.us-west-2.rds.amazonaws.com
  
  DBName:
    Type: String
    Description: Database name
    Default: NewsEngine
    
  DBPassword:
    Type: String
    Description: Database password
    NoEcho: true
    Default: qKUw2ecN7JTr7smStbP5Cw

  DBUser:
    Type: String
    Description: Database user
    Default: sd.trivia.app.user
    

Outputs:
  FunctionArn:
    Description: Content Mailing Lambda Function ARN
    Value: !GetAtt ContentMailingFunction.Arn
    Export:
      Name: !Sub "${AWS::StackName}-FunctionArn"
  
  FunctionUrl:
    Description: Function URL
    Value: !GetAtt ContentMailingFunctionUrl.FunctionUrl
    Export:
      Name: !Sub "${AWS::StackName}-FunctionUrl"
  
  RoleArn:
    Description: IAM Role ARN
    Value: !GetAtt ContentMailingV11ExecutionRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-RoleArn"