AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: DedupService V3 — SAM managed, DynamoDB Options 1+3 optimizations

Resources:

  DedupServiceV3Role:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ContentMailing_DedupService_Prod_V3_Execution_Role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CloudWatchLogsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                Resource: arn:aws:logs:us-west-2:022542942195:*
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - arn:aws:logs:us-west-2:022542942195:log-group:/aws/lambda/*:*

        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:BatchGetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:DescribeTable
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:UpdateTimeToLive
                  - dynamodb:DescribeTimeToLive
                Resource:
                  - arn:aws:dynamodb:us-west-2:022542942195:table/engagement_user_activity*
                  - arn:aws:dynamodb:us-west-2:022542942195:table/engagement_request_log*
              - Effect: Allow
                Action:
                  - dynamodb:ListTables
                Resource: "*"

  DedupServiceFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: DedupService_Prod_V3
      CodeUri: ./src
      Description: 'DedupService V3 — per-project DynamoDB tables, ConsistentRead:false, active-dates summary'
      MemorySize: 256
      Timeout: 30
      Handler: index.handler
      Runtime: nodejs22.x
      Architectures:
        - x86_64
      EphemeralStorage:
        Size: 512
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: BUFFERED
        Cors:
          AllowOrigins:
            - '*'
          MaxAge: 0
      PackageType: Zip
      Role: !GetAtt DedupServiceV3Role.Arn
      RecursiveLoop: Terminate
      SnapStart:
        ApplyOn: None
      Tags:
        Product: ContentMailingDedup
        Environment: Production
        Version: V3
      RuntimeManagementConfig:
        UpdateRuntimeOn: Auto


Parameters:

  StackName:
    Type: String
    Default: dedup-service-prod-v3
    Description: Name for the CloudFormation stack

  DeploymentRegion:
    Type: String
    Default: us-west-2
    Description: AWS Region for deployment


Outputs:
  FunctionArn:
    Description: DedupService Lambda Function ARN
    Value: !GetAtt DedupServiceFunction.Arn
    Export:
      Name: !Sub "${AWS::StackName}-FunctionArn"

  FunctionUrl:
    Description: DedupService Function URL — update dedupApiV2 constant in all project index.js files
    Value: !GetAtt DedupServiceFunctionUrl.FunctionUrl
    Export:
      Name: !Sub "${AWS::StackName}-FunctionUrl"

  RoleArn:
    Description: IAM Role ARN
    Value: !GetAtt DedupServiceV3Role.Arn
    Export:
      Name: !Sub "${AWS::StackName}-RoleArn"
